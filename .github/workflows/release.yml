name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: bnbclaw-*.tgz
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
